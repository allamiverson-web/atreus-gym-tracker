<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atreus Gym Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="city-bg" aria-hidden="true">
      <div class="aerial-city"></div>
      <div class="city-scan"></div>
      <div class="city-glow"></div>
    </div>

    <header class="topbar">
      <div>
        <p class="eyebrow">Atreus</p>
        <h1>Cyber gym tracker</h1>
      </div>
      <nav class="tabs" aria-label="Main pages">
        <button class="tab active" data-view="dashboard" type="button">Dashboard</button>
        <button class="tab" data-view="trends" type="button">Trends</button>
      </nav>
    </header>

    <main>
      <section class="view active" id="dashboard-view">
        <section class="hero">
          <div class="timer-panel">
            <div class="timer-header">
              <span id="session-status">Ready to train</span>
              <strong id="today-status">No session today</strong>
            </div>
            <output class="timer" id="timer-display">00:00:00</output>
            <div class="timer-actions">
              <button class="primary" id="start-btn" type="button">Start gym</button>
              <button id="pause-btn" type="button">Pause</button>
              <button id="finish-btn" type="button">Finish session</button>
            </div>
          </div>

          <div class="stats-strip" aria-label="Current stats">
            <article>
              <span>Level</span>
              <strong id="level-stat">1</strong>
            </article>
            <article>
              <span>XP</span>
              <strong id="xp-stat">0</strong>
            </article>
            <article>
              <span>Streak</span>
              <strong id="streak-stat">0 days</strong>
            </article>
            <article>
              <span>Total reps</span>
              <strong id="reps-stat">0</strong>
            </article>
          </div>
        </section>

        <section class="workout-grid">
          <div class="character-zone" aria-label="Interactive muscle character">
            <div class="character-title">
              <h2>Tap a muscle</h2>
              <p id="selected-copy">Chest selected</p>
            </div>
            <svg class="avatar character-avatar" viewBox="0 0 360 560" role="img" aria-labelledby="avatar-title">
              <title id="avatar-title">Interactive body muscle selector</title>
              <defs>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="3.5" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
                <linearGradient id="suit" x1="92" x2="268" y1="94" y2="514" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#232944" />
                  <stop offset="0.54" stop-color="#17192f" />
                  <stop offset="1" stop-color="#0b0e1e" />
                </linearGradient>
                <linearGradient id="skin" x1="130" x2="225" y1="24" y2="140" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#ffd0b6" />
                  <stop offset="1" stop-color="#b86f64" />
                </linearGradient>
              </defs>
              <ellipse cx="180" cy="528" rx="92" ry="16" class="character-shadow" />
              <path d="M132 39 C141 18 176 9 205 19 C229 28 245 51 237 82 C232 101 217 118 195 125 L164 125 C139 116 122 91 126 66 C127 56 129 47 132 39 Z" class="hair" />
              <path d="M138 70 C138 38 162 23 184 23 C209 23 228 43 226 73 C224 105 205 125 181 125 C157 125 138 102 138 70 Z" class="skin" />
              <path d="M150 47 C165 24 202 24 220 57 C206 45 181 42 154 56 Z" class="hair" />
              <circle cx="166" cy="75" r="4" class="face" />
              <circle cx="196" cy="75" r="4" class="face" />
              <path d="M170 98 C179 105 190 105 199 98" class="face-line" />
              <path d="M160 119 L200 119 L210 155 C193 169 166 169 150 155 Z" class="neck" />
              <path d="M114 154 C131 119 157 106 180 106 C204 106 229 119 247 154 C272 203 267 270 237 324 L216 512 L186 512 L180 365 L174 512 L144 512 L123 324 C93 269 89 203 114 154 Z" class="suit-base" />
              <path d="M115 160 C92 174 76 211 68 268 L56 360 C53 383 83 388 91 365 L111 283 C121 244 132 211 145 178 Z" class="suit-base limb" />
              <path d="M245 160 C268 174 284 211 292 268 L304 360 C307 383 277 388 269 365 L249 283 C239 244 228 211 215 178 Z" class="suit-base limb" />
              <path d="M143 511 L136 536 L171 536 L177 511 Z" class="boot" />
              <path d="M183 511 L189 536 L224 536 L217 511 Z" class="boot" />
              <path d="M122 156 C140 137 160 132 180 132 C201 132 220 137 238 156" class="armor-line" />
              <path d="M139 322 C160 341 201 341 222 322" class="armor-line" />
              <path d="M180 165 L180 332" class="armor-line" />
              <path d="M128 242 C151 257 209 257 232 242" class="armor-line" />
              <path data-muscle-fill="chest" d="M145 178 C158 164 172 159 180 180 C188 159 202 164 215 178 C211 215 197 236 180 239 C163 236 149 215 145 178 Z" class="muscle-fill chest-fill" />
              <path data-muscle-fill="back" d="M141 250 C156 268 204 268 219 250 L212 318 C194 334 166 334 148 318 Z" class="muscle-fill back-fill" />
              <path data-muscle-fill="shoulders" d="M107 157 C113 135 134 128 153 141 C143 153 136 171 132 193 C119 191 108 179 107 157 Z" class="muscle-fill shoulders-fill" />
              <path data-muscle-fill="shoulders" d="M253 157 C247 135 226 128 207 141 C217 153 224 171 228 193 C241 191 252 179 253 157 Z" class="muscle-fill shoulders-fill" />
              <path data-muscle-fill="arms" d="M95 180 C116 191 114 226 103 268 L88 350 C84 368 61 364 65 345 L79 269 C84 226 77 197 95 180 Z" class="muscle-fill arms-fill" />
              <path data-muscle-fill="arms" d="M265 180 C244 191 246 226 257 268 L272 350 C276 368 299 364 295 345 L281 269 C276 226 283 197 265 180 Z" class="muscle-fill arms-fill" />
              <path data-muscle-fill="core" d="M151 239 L209 239 L204 321 C190 333 170 333 156 321 Z" class="muscle-fill core-fill" />
              <path data-muscle-fill="legs" d="M147 330 C166 340 176 383 171 431 L162 514 C159 535 133 533 135 512 L137 421 C138 379 136 348 147 330 Z" class="muscle-fill legs-fill" />
              <path data-muscle-fill="legs" d="M213 330 C194 340 184 383 189 431 L198 514 C201 535 227 533 225 512 L223 421 C222 379 224 348 213 330 Z" class="muscle-fill legs-fill" />
              <g class="muscle-btn" data-muscle="chest" role="button" tabindex="0" aria-label="Chest">
                <path d="M145 178 C158 164 172 159 180 180 C188 159 202 164 215 178 C211 215 197 236 180 239 C163 236 149 215 145 178 Z" />
              </g>
              <g class="muscle-btn" data-muscle="back" role="button" tabindex="0" aria-label="Back">
                <path d="M141 250 C156 268 204 268 219 250 L212 318 C194 334 166 334 148 318 Z" />
              </g>
              <g class="muscle-btn" data-muscle="shoulders" role="button" tabindex="0" aria-label="Shoulders">
                <path d="M107 157 C113 135 134 128 153 141 C143 153 136 171 132 193 C119 191 108 179 107 157 Z" />
                <path d="M253 157 C247 135 226 128 207 141 C217 153 224 171 228 193 C241 191 252 179 253 157 Z" />
              </g>
              <g class="muscle-btn" data-muscle="arms" role="button" tabindex="0" aria-label="Arms">
                <path d="M95 180 C116 191 114 226 103 268 L88 350 C84 368 61 364 65 345 L79 269 C84 226 77 197 95 180 Z" />
                <path d="M265 180 C244 191 246 226 257 268 L272 350 C276 368 299 364 295 345 L281 269 C276 226 283 197 265 180 Z" />
              </g>
              <g class="muscle-btn" data-muscle="core" role="button" tabindex="0" aria-label="Core">
                <path d="M151 239 L209 239 L204 321 C190 333 170 333 156 321 Z" />
              </g>
              <g class="muscle-btn" data-muscle="legs" role="button" tabindex="0" aria-label="Legs">
                <path d="M147 330 C166 340 176 383 171 431 L162 514 C159 535 133 533 135 512 L137 421 C138 379 136 348 147 330 Z" />
                <path d="M213 330 C194 340 184 383 189 431 L198 514 C201 535 227 533 225 512 L223 421 C222 379 224 348 213 330 Z" />
              </g>
            </svg>
            <div class="muscle-chips" aria-label="Muscle shortcuts">
              <button data-muscle-chip="chest" type="button">Chest</button>
              <button data-muscle-chip="back" type="button">Back</button>
              <button data-muscle-chip="shoulders" type="button">Shoulders</button>
              <button data-muscle-chip="arms" type="button">Arms</button>
              <button data-muscle-chip="core" type="button">Core</button>
              <button data-muscle-chip="legs" type="button">Legs</button>
            </div>
          </div>

          <form class="log-panel" id="workout-form">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Log workout</p>
                <h2 id="form-title">Chest workout</h2>
              </div>
              <span class="pill" id="muscle-xp">0 XP</span>
            </div>

            <label>
              Exercise
              <input id="exercise-input" type="text" placeholder="Bench press" required />
            </label>
            <div class="form-row">
              <label>
                Sets
                <input id="sets-input" type="number" min="1" max="20" value="3" required />
              </label>
              <label>
                Reps
                <input id="reps-input" type="number" min="1" max="200" value="10" required />
              </label>
              <label>
                Weight
                <input id="weight-input" type="number" min="0" max="1000" value="0" />
              </label>
            </div>
            <button class="primary wide" type="submit">Add workout</button>
          </form>

          <section class="activity-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Today</p>
                <h2>Workout log</h2>
              </div>
              <button id="clear-demo-btn" type="button">Reset data</button>
            </div>
            <div class="log-list" id="log-list"></div>
          </section>
        </section>
      </section>

      <section class="view" id="trends-view">
        <section class="trend-layout">
          <div class="calendar-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Training days</p>
                <h2>Monthly map</h2>
              </div>
              <span class="pill" id="month-label"></span>
            </div>
            <div class="calendar" id="calendar"></div>
          </div>

          <div class="chart-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Past 7 days</p>
                <h2>Volume trend</h2>
              </div>
              <span class="pill" id="trend-summary">0 reps</span>
            </div>
            <div class="bars" id="bars"></div>
          </div>

          <div class="muscle-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Balance</p>
                <h2>Muscle XP</h2>
              </div>
            </div>
            <div class="muscle-list" id="muscle-list"></div>
          </div>
        </section>
      </section>
    </main>

    <template id="empty-template">
      <div class="empty">
        <strong>No workouts yet</strong>
        <span>Start the timer, tap a muscle, and log your first set.</span>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
