<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atreus Gym Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="city-bg" aria-hidden="true">
      <div class="aerial-city"></div>
      <div class="city-scan"></div>
      <div class="city-glow"></div>
    </div>

    <header class="topbar">
      <div>
        <p class="eyebrow">Atreus</p>
        <h1>Cyber gym tracker</h1>
      </div>
      <nav class="tabs" aria-label="Main pages">
        <button class="tab active" data-view="dashboard" type="button">Dashboard</button>
        <button class="tab" data-view="trends" type="button">Trends</button>
      </nav>
    </header>

    <main>
      <section class="view active" id="dashboard-view">
        <section class="hero">
          <div class="timer-panel">
            <div class="timer-header">
              <span id="session-status">Ready to train</span>
              <strong id="today-status">No session today</strong>
            </div>
            <output class="timer" id="timer-display">00:00:00</output>
            <div class="timer-actions">
              <button class="primary" id="start-btn" type="button">Start gym</button>
              <button id="pause-btn" type="button">Pause</button>
              <button id="finish-btn" type="button">Finish session</button>
            </div>
          </div>

          <div class="stats-strip" aria-label="Current stats">
            <article>
              <span>Level</span>
              <strong id="level-stat">1</strong>
            </article>
            <article>
              <span>XP</span>
              <strong id="xp-stat">0</strong>
            </article>
            <article>
              <span>Streak</span>
              <strong id="streak-stat">0 days</strong>
            </article>
            <article>
              <span>Total reps</span>
              <strong id="reps-stat">0</strong>
            </article>
          </div>
        </section>

        <section class="workout-grid">
          <div class="character-zone" aria-label="Interactive muscle character">
            <div class="character-title">
              <h2>Tap a muscle</h2>
              <p id="selected-copy">Chest selected</p>
            </div>
            <svg class="avatar character-avatar" viewBox="0 0 360 560" role="img" aria-labelledby="avatar-title">
              <title id="avatar-title">Interactive body muscle selector</title>
              <defs>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="3.5" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
                <linearGradient id="skin" x1="104" x2="252" y1="28" y2="526" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#f4bea3" />
                  <stop offset="0.43" stop-color="#c77c67" />
                  <stop offset="1" stop-color="#6f3d42" />
                </linearGradient>
                <linearGradient id="skinSide" x1="72" x2="285" y1="146" y2="522" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#e39d85" />
                  <stop offset="0.55" stop-color="#9b5a58" />
                  <stop offset="1" stop-color="#472c36" />
                </linearGradient>
                <linearGradient id="muscleTone" x1="104" x2="254" y1="126" y2="526" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#f8a58f" />
                  <stop offset="0.5" stop-color="#b94f5f" />
                  <stop offset="1" stop-color="#542f48" />
                </linearGradient>
                <linearGradient id="muscleActive" x1="105" x2="255" y1="120" y2="510" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#9ffcf4" />
                  <stop offset="0.5" stop-color="#46d8d6" />
                  <stop offset="1" stop-color="#2385b6" />
                </linearGradient>
              </defs>
              <g class="anatomy-model">
                <ellipse cx="180" cy="528" rx="84" ry="15" class="character-shadow" />
                <path d="M149 70 C149 46 162 31 180 31 C198 31 211 46 211 70 C211 94 199 116 180 116 C161 116 149 94 149 70 Z" class="anatomy-base" />
                <path d="M153 77 C158 70 163 67 170 68 M190 68 C197 67 202 70 207 77 M169 96 C176 101 185 101 191 96" class="face-mark" />
                <path d="M160 112 C166 125 194 125 200 112 L206 143 C193 154 167 154 154 143 Z" class="anatomy-base" />
                <path d="M119 153 C135 132 157 124 180 124 C203 124 225 132 241 153 C252 183 250 226 241 260 C236 283 225 309 214 335 L207 357 C192 366 168 366 153 357 L146 335 C135 309 124 283 119 260 C110 226 108 183 119 153 Z" class="anatomy-base torso-base" />
                <path d="M121 154 C99 163 87 184 82 214 L66 334 C63 357 82 369 96 349 L111 278 C119 239 126 199 143 170 Z" class="anatomy-base skin-side" />
                <path d="M239 154 C261 163 273 184 278 214 L294 334 C297 357 278 369 264 349 L249 278 C241 239 234 199 217 170 Z" class="anatomy-base skin-side" />
                <path d="M148 350 C137 373 133 401 136 437 L139 512 C140 536 163 537 168 514 L176 421 C178 391 171 363 157 350 Z" class="anatomy-base" />
                <path d="M212 350 C223 373 227 401 224 437 L221 512 C220 536 197 537 192 514 L184 421 C182 391 189 363 203 350 Z" class="anatomy-base" />
                <path d="M141 337 C157 349 203 349 219 337 L211 364 C191 374 169 374 149 364 Z" class="briefs" />
                <path data-muscle-fill="shoulders" d="M110 154 C117 132 139 126 160 139 C149 153 142 171 139 193 C124 191 112 178 110 154 Z" class="muscle-fill" />
                <path data-muscle-fill="shoulders" d="M250 154 C243 132 221 126 200 139 C211 153 218 171 221 193 C236 191 248 178 250 154 Z" class="muscle-fill" />
                <path data-muscle-fill="chest" d="M137 170 C151 151 173 151 180 178 L179 229 C157 230 141 216 135 196 Z" class="muscle-fill" />
                <path data-muscle-fill="chest" d="M223 170 C209 151 187 151 180 178 L181 229 C203 230 219 216 225 196 Z" class="muscle-fill" />
                <path data-muscle-fill="back" d="M124 204 C140 220 151 251 148 292 C136 286 126 268 122 247 C119 229 118 214 124 204 Z" class="muscle-fill lat-fill" />
                <path data-muscle-fill="back" d="M236 204 C220 220 209 251 212 292 C224 286 234 268 238 247 C241 229 242 214 236 204 Z" class="muscle-fill lat-fill" />
                <path data-muscle-fill="core" d="M153 229 C166 235 194 235 207 229 L202 322 C191 334 169 334 158 322 Z" class="muscle-fill" />
                <path data-muscle-fill="arms" d="M96 176 C113 187 115 220 105 259 L94 318 C90 340 69 338 70 315 L80 251 C85 214 81 189 96 176 Z" class="muscle-fill" />
                <path data-muscle-fill="arms" d="M264 176 C247 187 245 220 255 259 L266 318 C270 340 291 338 290 315 L280 251 C275 214 279 189 264 176 Z" class="muscle-fill" />
                <path data-muscle-fill="legs" d="M150 348 C164 359 174 388 172 424 L166 513 C163 534 143 534 142 512 L140 436 C139 399 137 371 150 348 Z" class="muscle-fill" />
                <path data-muscle-fill="legs" d="M210 348 C196 359 186 388 188 424 L194 513 C197 534 217 534 218 512 L220 436 C221 399 223 371 210 348 Z" class="muscle-fill" />
                <path d="M137 168 C151 158 169 157 180 177 C191 157 209 158 223 168" class="anatomy-line" />
                <path d="M180 178 L180 322" class="anatomy-line" />
                <path d="M151 251 C164 258 196 258 209 251 M154 278 C167 284 193 284 206 278 M158 306 C169 312 191 312 202 306" class="anatomy-line" />
                <path d="M133 213 C145 230 150 254 148 289 M227 213 C215 230 210 254 212 289" class="anatomy-line" />
                <path d="M92 213 C103 234 102 277 93 318 M268 213 C257 234 258 277 267 318" class="anatomy-line" />
                <path d="M155 368 C168 397 168 463 160 511 M205 368 C192 397 192 463 200 511" class="anatomy-line" />
                <path d="M146 420 C154 426 163 426 172 420 M188 420 C197 426 206 426 214 420" class="body-shade" />
                <g class="muscle-btn" data-muscle="chest" role="button" tabindex="0" aria-label="Chest">
                  <path d="M135 160 C153 147 172 149 180 178 C188 149 207 147 225 160 L228 203 C216 228 199 237 180 235 C161 237 144 228 132 203 Z" />
                </g>
                <g class="muscle-btn" data-muscle="back" role="button" tabindex="0" aria-label="Back">
                  <path d="M121 196 C139 209 154 250 148 296 L126 288 C112 261 111 217 121 196 Z" />
                  <path d="M239 196 C221 209 206 250 212 296 L234 288 C248 261 249 217 239 196 Z" />
                </g>
                <g class="muscle-btn" data-muscle="shoulders" role="button" tabindex="0" aria-label="Shoulders">
                  <path d="M107 153 C115 127 139 121 161 137 C149 154 141 174 139 198 C122 196 109 180 107 153 Z" />
                  <path d="M253 153 C245 127 221 121 199 137 C211 154 219 174 221 198 C238 196 251 180 253 153 Z" />
                </g>
                <g class="muscle-btn" data-muscle="arms" role="button" tabindex="0" aria-label="Arms">
                  <path d="M96 173 C116 185 118 220 106 265 L96 322 C91 347 65 344 67 316 L78 248 C84 207 80 188 96 173 Z" />
                  <path d="M264 173 C244 185 242 220 254 265 L264 322 C269 347 295 344 293 316 L282 248 C276 207 280 188 264 173 Z" />
                </g>
                <g class="muscle-btn" data-muscle="core" role="button" tabindex="0" aria-label="Core">
                  <path d="M149 226 C165 234 195 234 211 226 L205 326 C190 341 170 341 155 326 Z" />
                </g>
                <g class="muscle-btn" data-muscle="legs" role="button" tabindex="0" aria-label="Legs">
                  <path d="M145 342 C164 351 177 386 173 431 L166 516 C162 540 137 538 138 510 L136 436 C135 397 134 359 145 342 Z" />
                  <path d="M215 342 C196 351 183 386 187 431 L194 516 C198 540 223 538 222 510 L224 436 C225 397 226 359 215 342 Z" />
                </g>
              </g>
            </svg>
            <div class="muscle-chips" aria-label="Muscle shortcuts">
              <button data-muscle-chip="chest" type="button">Chest</button>
              <button data-muscle-chip="back" type="button">Back</button>
              <button data-muscle-chip="shoulders" type="button">Shoulders</button>
              <button data-muscle-chip="arms" type="button">Arms</button>
              <button data-muscle-chip="core" type="button">Core</button>
              <button data-muscle-chip="legs" type="button">Legs</button>
            </div>
          </div>

          <form class="log-panel" id="workout-form">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Log workout</p>
                <h2 id="form-title">Chest workout</h2>
              </div>
              <span class="pill" id="muscle-xp">0 XP</span>
            </div>

            <label>
              Exercise
              <input id="exercise-input" type="text" placeholder="Bench press" required />
            </label>
            <div class="form-row">
              <label>
                Sets
                <input id="sets-input" type="number" min="1" max="20" value="3" required />
              </label>
              <label>
                Reps
                <input id="reps-input" type="number" min="1" max="200" value="10" required />
              </label>
              <label>
                Weight
                <input id="weight-input" type="number" min="0" max="1000" value="0" />
              </label>
            </div>
            <button class="primary wide" type="submit">Add workout</button>
          </form>

          <section class="activity-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Today</p>
                <h2>Workout log</h2>
              </div>
              <button id="clear-demo-btn" type="button">Reset data</button>
            </div>
            <div class="log-list" id="log-list"></div>
          </section>
        </section>
      </section>

      <section class="view" id="trends-view">
        <section class="trend-layout">
          <div class="calendar-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Training days</p>
                <h2>Monthly map</h2>
              </div>
              <span class="pill" id="month-label"></span>
            </div>
            <div class="calendar" id="calendar"></div>
          </div>

          <div class="chart-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Past 7 days</p>
                <h2>Volume trend</h2>
              </div>
              <span class="pill" id="trend-summary">0 reps</span>
            </div>
            <div class="bars" id="bars"></div>
          </div>

          <div class="muscle-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Balance</p>
                <h2>Muscle XP</h2>
              </div>
            </div>
            <div class="muscle-list" id="muscle-list"></div>
          </div>
        </section>
      </section>
    </main>

    <template id="empty-template">
      <div class="empty">
        <strong>No workouts yet</strong>
        <span>Start the timer, tap a muscle, and log your first set.</span>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
